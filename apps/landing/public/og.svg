<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="1" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7849"/>
      <stop offset="1" stop-color="#ffb347"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="-5%" r="75%">
      <stop offset="0" stop-color="#ff7849" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ff7849" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark + wordmark -->
  <circle cx="100" cy="128" r="20" fill="url(#accent)"/>
  <text x="136" y="142" font-size="42" font-weight="700" fill="#e9edf5">RestAI</text>
  <text x="1120" y="142" font-size="26" fill="#98a3b8" text-anchor="end">restai.bezenti.com</text>

  <!-- Headline -->
  <text x="80" y="298" font-size="76" font-weight="800" fill="#e9edf5" letter-spacing="-2">Todo tu restaurante,</text>
  <text x="80" y="390" font-size="76" font-weight="800" fill="url(#accent)" letter-spacing="-2">en una sola plataforma.</text>

  <!-- Subhead -->
  <text x="80" y="452" font-size="27" fill="#98a3b8">POS · Cocina en vivo · Carta QR · SUNAT · Multisucursal</text>

  <!-- Feature pills -->
  <g font-size="24" fill="#cdd6e6" transform="translate(80,508)">
    <rect x="0" y="0" width="216" height="58" rx="29" fill="#141b2b" stroke="#1f2937"/>
    <text x="108" y="37" text-anchor="middle">Punto de venta</text>
    <rect x="232" y="0" width="232" height="58" rx="29" fill="#141b2b" stroke="#1f2937"/>
    <text x="348" y="37" text-anchor="middle">Cocina en vivo</text>
    <rect x="480" y="0" width="246" height="58" rx="29" fill="#141b2b" stroke="#1f2937"/>
    <text x="603" y="37" text-anchor="middle">SUNAT integrado</text>
  </g>

  <rect x="0" y="622" width="1200" height="8" fill="url(#accent)"/>
</svg>
