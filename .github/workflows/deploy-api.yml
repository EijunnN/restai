name: Deploy API (Cloudflare Containers)

# Construye la imagen Docker de la API y la despliega en Cloudflare Containers.
# El runner ubuntu-latest ya trae Docker, así que `wrangler deploy` arma y sube
# la imagen al registry de Cloudflare — sin necesidad de Docker local.
#
# Secretos requeridos en el repo (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   token "Claude Contabo" (permite Workers + Containers)
#   CLOUDFLARE_ACCOUNT_ID  id de la cuenta de Cloudflare
#   DATABASE_URL           connection string de Neon (para migraciones)
#
# Los secretos de la propia API se sincronizan automáticamente desde GitHub
# Secrets al Worker en cada deploy (paso "Sync API secrets"). Secrets a crear:
#   DATABASE_URL, JWT_SECRET, JWT_REFRESH_SECRET, SUNAT_ENCRYPTION_KEY, REDIS_URL
# (y opcionalmente R2_* si usas almacenamiento de imágenes).

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "Dockerfile.api"
      - "deploy/cloudflare/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  migrate:
    name: Aplicar migraciones (Neon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun install --frozen-lockfile
      - name: Run drizzle migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Build + deploy a Cloudflare Containers
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Instalar dependencias del shim de deploy
        working-directory: deploy/cloudflare
        run: bun install
      - name: Deploy (wrangler construye la imagen con Docker en el runner)
        working-directory: deploy/cloudflare
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # El sync va DESPUÉS del deploy: en el primer despliegue el Worker debe existir
      # antes de poder fijarle secretos. El contenedor los toma en su próximo arranque.
      - name: Sync API secrets to Worker
        working-directory: deploy/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SUNAT_ENCRYPTION_KEY: ${{ secrets.SUNAT_ENCRYPTION_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          # jq escapa correctamente cada valor; GitHub enmascara los secretos en el log.
          jq -n \
            --arg DATABASE_URL "$DATABASE_URL" \
            --arg JWT_SECRET "$JWT_SECRET" \
            --arg JWT_REFRESH_SECRET "$JWT_REFRESH_SECRET" \
            --arg SUNAT_ENCRYPTION_KEY "$SUNAT_ENCRYPTION_KEY" \
            --arg REDIS_URL "$REDIS_URL" \
            '{DATABASE_URL:$DATABASE_URL, JWT_SECRET:$JWT_SECRET, JWT_REFRESH_SECRET:$JWT_REFRESH_SECRET, SUNAT_ENCRYPTION_KEY:$SUNAT_ENCRYPTION_KEY, REDIS_URL:$REDIS_URL}' \
            > /tmp/restai-secrets.json
          bunx wrangler secret bulk /tmp/restai-secrets.json
          rm -f /tmp/restai-secrets.json
