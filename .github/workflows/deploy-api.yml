name: Deploy API (Cloudflare Worker)

# Despliega la API como Cloudflare Worker (serverless, SIN contenedor).
# No usa Docker; `wrangler deploy` empaqueta el Worker. Requiere permisos
# estándar de Workers en el token (no necesita Containers).
#
# Secretos del repo (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   DATABASE_URL  (Neon)  — usado por migraciones y como secreto del Worker
#   JWT_SECRET, JWT_REFRESH_SECRET, SUNAT_ENCRYPTION_KEY
#   (opcional) ABLY_API_KEY o PUSHER_* para el realtime

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/**"
      - "deploy/cloudflare-worker/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  migrate:
    name: Aplicar migraciones (Neon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - run: bun install --frozen-lockfile
      - name: Run drizzle migrations
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy Cloudflare Worker
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      # Instala el workspace (node_modules) para que wrangler pueda empaquetar la app.
      - run: bun install --frozen-lockfile
      - name: Instalar wrangler
        working-directory: deploy/cloudflare-worker
        run: bun install
      - name: Deploy del Worker
        working-directory: deploy/cloudflare-worker
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Tras crear el Worker, sincroniza sus secretos desde GitHub Secrets.
      - name: Sync secrets al Worker
        working-directory: deploy/cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SUNAT_ENCRYPTION_KEY: ${{ secrets.SUNAT_ENCRYPTION_KEY }}
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          jq -n \
            --arg DATABASE_URL "$DATABASE_URL" \
            --arg JWT_SECRET "$JWT_SECRET" \
            --arg JWT_REFRESH_SECRET "$JWT_REFRESH_SECRET" \
            --arg SUNAT_ENCRYPTION_KEY "$SUNAT_ENCRYPTION_KEY" \
            --arg ABLY_API_KEY "$ABLY_API_KEY" \
            --arg R2_ACCOUNT_ID "$R2_ACCOUNT_ID" \
            --arg R2_ACCESS_KEY_ID "$R2_ACCESS_KEY_ID" \
            --arg R2_SECRET_ACCESS_KEY "$R2_SECRET_ACCESS_KEY" \
            --arg R2_BUCKET_NAME "$R2_BUCKET_NAME" \
            --arg R2_PUBLIC_URL "$R2_PUBLIC_URL" \
            '{
              DATABASE_URL:$DATABASE_URL,
              JWT_SECRET:$JWT_SECRET,
              JWT_REFRESH_SECRET:$JWT_REFRESH_SECRET,
              SUNAT_ENCRYPTION_KEY:$SUNAT_ENCRYPTION_KEY,
              ABLY_API_KEY:$ABLY_API_KEY,
              R2_ACCOUNT_ID:$R2_ACCOUNT_ID,
              R2_ACCESS_KEY_ID:$R2_ACCESS_KEY_ID,
              R2_SECRET_ACCESS_KEY:$R2_SECRET_ACCESS_KEY,
              R2_BUCKET_NAME:$R2_BUCKET_NAME,
              R2_PUBLIC_URL:$R2_PUBLIC_URL
            }' \
            > /tmp/restai-secrets.json
          bunx wrangler secret bulk /tmp/restai-secrets.json
          rm -f /tmp/restai-secrets.json
